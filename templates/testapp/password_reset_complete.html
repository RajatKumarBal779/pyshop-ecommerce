{% extends 'testapp/base.html' %}
{% block content %}

<header class="bg-dark py-4">
    <div class="container">
        <div class="text-center text-white">
            <h1 class="h2 fw-bolder">Password Reset</h1>
            <p class="text-white-50 mb-0">Your password has been changed</p>
        </div>
    </div>
</header>

<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 60vh;">
    <div class="col-11 col-md-5 col-lg-4 text-center">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div style="font-size: 2.5rem; margin-bottom: 1rem;">✅</div>
                <h5 class="fw-bold mb-2">All Done!</h5>
                <p class="text-muted small mb-4">Your password has been reset successfully. You can now log in with your new password.</p>
                <a href="{% url 'login' %}" class="btn btn-dark rounded-3 w-100">Login Now</a>
            </div>
        </div>
    </div>
</div>
<br><br>

{% endblock %}
