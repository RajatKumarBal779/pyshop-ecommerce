{% extends 'testapp/base.html' %}
{% block content %}

<!-- Header-->
<header class="bg-dark py-4">
    <div class="container">
        <div class="text-center text-white">
            <h1 class="h2 fw-bolder">Register</h1>
            <p class="text-white-50 mb-0">Create Your Account</p>
        </div>
    </div>
</header>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <form method="POST" action="{% url 'register' %}">
                    {% csrf_token %}

                    <div class="mb-3">{{ form.username }}</div>
                    <div class="mb-3">{{ form.first_name }}</div>
                    <div class="mb-3">{{ form.last_name }}</div>
                    <div class="mb-3">{{ form.email }}</div>
                    <div class="mb-3">{{ form.password1 }}</div>
                    <div class="mb-3">{{ form.password2 }}</div>

                    <!-- Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark rounded-3">Register</button>
                    </div>

                    <!-- Login redirect -->
                    <p class="text-center mt-3 small">
                        Already have an account?
                        <a href="{% url 'login' %}" class="text-dark fw-semibold text-decoration-none">Login</a>
                    </p>

                </form>

            </div>
        </div>
    </div>
</div>

<br><br><br><br><br><br>

{% endblock %}
