{% extends 'testapp/base.html' %}
{% block content %}

<!-- Header-->
<header class="bg-dark py-4">
    <div class="container">
        <div class="text-center text-white">
            <h1 class="h2 fw-bolder">Categories</h1>
            <p class="text-white-50 mb-0">Choose Your Category Below</p>
        </div>
    </div>
</header>

<div class="container py-5">
    <div class="row justify-content-center">

        <div class="col-lg-8">
            <div class="row g-4">

                {% for category in categories %}
                <div class="col-md-6 col-lg-4">
                    <a href="{% url 'category' category %}" class="text-decoration-none">

                        <div class="card text-center shadow-sm h-100"
                             style="border-radius: 12px; transition: 0.3s;">

                            <div class="card-body">
                                <h5 class="fw-bold text-dark">{{category}}</h5>
                                <p class="text-muted small mb-0">Explore products</p>
                            </div>

                        </div>

                    </a>
                </div>
                {% endfor %}

            </div>
        </div>

    </div>
</div>
<style>
    .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}
</style>
<br><br><br><br><br><br><br><br><br><br><br><br><br>

{% endblock %}
