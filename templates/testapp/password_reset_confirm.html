{% extends 'testapp/base.html' %}
{% block content %}

<header class="bg-dark py-4">
    <div class="container">
        <div class="text-center text-white">
            <h1 class="h2 fw-bolder">Reset Password</h1>
            <p class="text-white-50 mb-0">Enter your new password</p>
        </div>
    </div>
</header>

<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 60vh;">
    <div class="col-11 col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                {% if validlink %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="password"
                            name="new_password1"
                            class="form-control rounded-3"
                            placeholder="Enter new password"
                            required />
                    </div>
                    <div class="mb-3">
                        <input type="password"
                            name="new_password2"
                            class="form-control rounded-3"
                            placeholder="Confirm new password"
                            required />
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark rounded-3">Reset Password</button>
                    </div>
                </form>
                {% else %}
                <div class="text-center">
                    <div style="font-size: 2.5rem; margin-bottom: 1rem;">❌</div>
                    <h5 class="fw-bold mb-2">Link Expired</h5>
                    <p class="text-muted small mb-4">This reset link is invalid or has expired.</p>
                    <a href="{% url 'password_reset' %}" class="btn btn-dark rounded-3 w-100">Request New Link</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
<br><br>

{% endblock %}
