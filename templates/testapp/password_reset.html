{% extends 'testapp/base.html' %}
{% block content %}

<header class="bg-dark py-4">
    <div class="container">
        <div class="text-center text-white">
            <h1 class="h2 fw-bolder">Forgot Password</h1>
            <p class="text-white-50 mb-0">Enter your email to reset password</p>
        </div>
    </div>
</header>

<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 60vh;">
    <div class="col-11 col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required />
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark rounded-3">Send Reset Link</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<br><br>

{% endblock %}
