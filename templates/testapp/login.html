{% extends 'testapp/base.html' %}
{% block content %}
<!-- Header-->
<header class="bg-dark py-4">
    <div class="container">
        <div class="text-center text-white">
            <h1 class="h2 fw-bolder">Login</h1>
            <p class="text-white-50 mb-0">Log In To Your Account</p>
        </div>
    </div>
</header>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}

                    <!-- Email -->
                    <div class="mb-3">
                        <!-- <label class="form-label">Email address</label> -->
                        <input type="text" class="form-control rounded-3" name="username"
                            placeholder="Enter Your Username" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <!-- <label class="form-label">Password</label> -->
                        <input type="password" class="form-control rounded-3" name="password"
                            placeholder="Enter Your Password" required>
                    </div>

                    <!-- Remember + Forgot -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small">Remember me</label>
                        </div>
                        <a href="{% url 'password_reset' %}" class="text-dark small text-decoration-none">Forgot password?</a>
                    </div>

                    <!-- Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark rounded-3">Login</button>
                    </div>

                    <!-- Signup -->
                    <p class="text-center mt-3 small">
                        Don’t have an account?
                        <a href="{% url 'register' %}" class="text-dark fw-semibold text-decoration-none">Register</a>
                    </p>

                </form>

            </div>
        </div>
    </div>
</div>
<br><br><br><br><br><br>
{% endblock %}
